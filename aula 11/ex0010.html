<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Insira a velocidade atual:</h1>
    Velocidade do veículo: <input type="number" id="number1" placeholder="Velocidade">
    <input type="button" id="button_check" value="Verificar">
    <div id="velResult"></div>
    <script>
        
        let verifyButton = document.getElementById('button_check')

        verifyButton.addEventListener("click", verifySpeed)

        function verifySpeed(){
            let speed = document.getElementById('number1').valueAsNumber
            let velResult = document.querySelector('div#velResult')
            velResult.innerHTML = `<p>Sua velocidade atual é de ${speed}km/h</p>`

            if (speed > 60){
                velResult.innerHTML += `<p> Você está <strong>MULTADO</strong> por ultrapassar a velocidade permitida!`
            
            } else{
                velResult.innerHTML += `<p> Dirija com segurança!</p>`
        }}
    </script>

</body>
</html>
