<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Naturalidade Brasileira</title>
</head>
<body>
    <h1>Sistema de Naturalidade Brasileira</h1>
    <input type="text" name="" id="stateText">
    <input type="button" value="Verificar" id="verifyButton">
    <div id="verifyResult"></div>

    <script>

        let verifyButton = document.getElementById('verifyButton')
        verifyButton.addEventListener('click', verifyState)

        function verifyState()
        {
            let state = document.getElementById('stateText').value
            let verifyResult = document.getElementById('verifyResult')
            
            if (state.trim() === "são paulo"){ //O método ".trim()", remove os espaços.
                verifyResult.innerHTML = 'Você é um paulista!'
            } else {
                verifyResult.innerHTML = 'Você não é paulista!'
            }

        }

    </script>
</body>
</html>
