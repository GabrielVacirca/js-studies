<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            font: normal 15pt Arial ;
            background-color: rgb(102, 187, 102);
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    
    <!--DESSA FORMA DECLARA OS EVENTOS DIRETAMENTE NO HTML-->
    <!--<div id="area" onclick="clicar()" onmouseenter="enter()" onmouseout="leave()">Interagir</div> -->
    <!--Dispara o método onclick"clicar" que está sendo executado no JS-->
    <div id="area">Interagir</div>


    <script>
        /*Dessa forma utiliza o método "addEventListener(). Ele fica a escuta de eventos específicos, como um "clique" e executa uma função (callback) quando o evento é disparado
        
        SINTAXE:
        
        target.addEventListener(event, function, options);

        -target(OBRIGATORIO): O elemento DOM ao qual você deseja anexar o ouvinte de eventos (por exemplo, document.getElementById("myBtn"), window).

        -event(OBRIGATORIO): Uma sequência de caracteres que especifica o nome do evento (por exemplo, "click", "mouseover", "keydown"). Não use o "on"prefixo.

        -function(OBRIGATORIO): A função a ser executada quando o evento ocorrer. O Eventobjeto é passado para esta função como seu primeiro parâmetro.

        -options: Um objeto opcional que pode controlar o comportamento do ouvinte, como useCapture(booleano, o padrão é falsepara a fase de propagação).
        */
        const listener = document.getElementById('area')
        listener.addEventListener('click', clicar)
        listener.addEventListener('mouseenter', enter)
        listener.addEventListener('mouseout', leave)
        
        
        
        
        function clicar(){
            const area = document.getElementById('area')

            area.innerText = 'Clicou'
            area.style.backgroundColor = 'yellow'
        }

        function enter(){
            const enter = document.getElementById('area')
            enter.innerText = 'Entrou'
            enter.style.backgroundColor = 'lightblue'
            
        }
        function leave(){
            const leave = document.getElementById('area')
            leave.innerText = 'Saiu'
            leave.style.backgroundColor = 'red'
            
        }
    </script>
</body>
</html>
