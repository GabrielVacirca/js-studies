<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando números</title>
</head>
<body>
    <h1>Somando valores</h1>
    <input type="number" name="tx1n1" id="txtn1">
    <input type="number" name="tx1n2" id="txtn2">
    <input type="button" value="somar" id="somar">

    <div id="container"></div> 

    <script>
    const sumButton = document.getElementById('somar')
    sumButton.addEventListener('click', somar)
    
    function somar(){
         const n1 = document.getElementById('txtn1').valueAsNumber //Versão mais moderna de uma propiedade que retorna que o valor do campo é um número
         const n2 = document.getElementById('txtn2').valueAsNumber 

        const sum = (n1) + (n2)

         const result = document.createElement('div')
         result.innerHTML = `Resultado da soma: ${sum}`

         document.getElementById('container').appendChild(result); 
         //Essa linha, faz com que a div seja colocado na página html.
         //"appendChild(): Ele pega um elemento que você criou e coloca ele dentro de outro elemento no HTML."   
        }
    </script>
</body>
</html>
