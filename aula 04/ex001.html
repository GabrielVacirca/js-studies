<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: cadetblue;
            color: white;
            font: normal 20pt Arial;
        }
        h1 {
            padding-left: 500px;
            padding-right: 500px;
            text-align: center;
            color: rgb(73, 182, 255);
            background-color: aliceblue;
            border: 1px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Hello World!</h1>
    <p>Bem-vindo ao curso de JavaScript</p>

    <script>
        window.alert("Parabéns! Você iniciou o curso.") /*Dispara um alerta*/

    </script>
