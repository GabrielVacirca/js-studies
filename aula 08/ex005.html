<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passos com DOM</title>
 <style>
    body {
        background: burlywood;
        color: rgb(0, 0, 0);
        font: normal 10pt Arial;
    }
 </style>

</head>
<body>
    <h1>Entendo o DOM</h1>
    <p>Document Object Model</p>
    <p id="r1">Aprendendo DOM</p>
    <div id="press">Clique em mim</div>
 
    <script>
        /*
        Selecionando o elemento pela TAG
        ==================================================
        const corpo = document.body
        const p1 = document.getElementsByTagName('p')[0] 
        ==================================================
        
        /*
        Selecionando o elemento pelo ID
         =================================================
        const press = document.getElementById('press')
        press.style.background = 'green'
        press.innerText = 'Estou aguardando...'
        =================================================
        PODE SE USAR TAMBÉM DESSA FORMA:
        document.getElementById('press').innerText = 'Olá'
        
        */

        /*
        Selecionando o elemento pelo NAME
        ====================================================
        const name = document.getElementsByName('press')[0]
        name.innerText = "Bom dia!"        
        ====================================================
        */
        
        /*
        Selecionando o elemento pela CLASSE
        ====================================================
        const d = document.getElementsByClassName('one')[0]
        d.innerText = "Bom dia!"
        ====================================================
        */

        /*
        Selecionando o elemento pelo SELETOR
        ================================================
        const d = document.querySelector('div#press')
        d.style.background = 'blue';
        ================================================
        */
    </script>
</body>
</html>
